services:
  db:
    image: postgres:16-alpine
    container_name: cms-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_EXPOSE_PORT:-5433}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./cms
      dockerfile: Dockerfile
    container_name: cms-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      SIGNER_KEY: ${SIGNER_KEY}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      SENDGRID_ENABLED: ${SENDGRID_ENABLED:-false}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}
      MOMO_ENABLED: ${MOMO_ENABLED:-false}
      MOMO_ENDPOINT: ${MOMO_ENDPOINT}
      MOMO_PARTNER_CODE: ${MOMO_PARTNER_CODE}
      MOMO_ACCESS_KEY: ${MOMO_ACCESS_KEY}
      MOMO_SECRET_KEY: ${MOMO_SECRET_KEY}
      MOMO_REDIRECT_URL: ${MOMO_REDIRECT_URL}
      MOMO_IPN_URL: ${MOMO_IPN_URL}
      MOMO_REQUEST_TYPE: ${MOMO_REQUEST_TYPE:-captureWallet}
      MOMO_LANG: ${MOMO_LANG:-vi}
    expose:
      - "8080"

  nginx:
    build:
      context: ./clinic-app
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_WS_URL: ""
    container_name: cms-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${NGINX_PORT:-80}:80"

volumes:
  db_data:
